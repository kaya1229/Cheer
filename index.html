<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Online Lightstick - WALK Edition</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .header { width: 100%; max-width: 360px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .info { font-size: 14px; color: #333; line-height: 1.6; font-weight: bold; }
        
        /* 믐먼봉 정교한 실루엣 UI */
        .meummonbong-frame { position: relative; width: 250px; height: 350px; margin: 20px 0; }
        .meummonbong-shape {
            width: 100%; height: 100%; background: #F3FFD5; position: absolute;
            clip-path: polygon(0% 12%, 36% 12%, 36% 0%, 64% 0%, 64% 12%, 100% 12%, 100% 32%, 92% 32%, 92% 48%, 100% 48%, 100% 90%, 94% 100%, 6% 100%, 0% 90%, 0% 48%, 8% 48%, 8% 32%, 0% 32%);
        }
        .glow-effect {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140%; height: 140%; background: radial-gradient(circle, rgba(206, 241, 61, 0.4) 0%, rgba(206, 241, 61, 0) 70%);
            filter: blur(20px);
        }
        .display-char { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 130px; font-weight: 900; color: #000; z-index: 2; }

        /* 컨트롤 영역 */
        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; text-align: center; }
        button { padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        #playBtn { background: #000; color: #CEF13D; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #playBtn.playing { background: #ff4d4d; color: #fff; }
        
        .song-status { font-size: 13px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="info">🎵 Now Playing: NCT 127 - 삐그덕 (Walk)</div>
    </div>

    <div class="meummonbong-frame">
        <div class="meummonbong-shape"><div class="glow-effect"></div></div>
        <div id="display" class="display-char">W</div>
    </div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="문구 입력" value="삐그덕 삐그덕 걷지 우리 방식대로">
        <button id="playBtn" onclick="togglePlay()">시작 (WALK!)</button>
        <div id="loadStatus" class="song-status">음악 데이터를 불러오는 중...</div>
    </div>

    <audio id="audioPlayer" loop crossorigin="anonymous"></audio>

    <script>
        let interval;
        let isPlaying = false;
        let currentIndex = 0;
        const currentBpm = 92; // '삐그덕 (Walk)'의 BPM
        const audio = document.getElementById('audioPlayer');

        // 페이지 로드 시 '삐그덕 (Walk)'를 자동으로 검색해서 세팅
        window.onload = function() {
            const script = document.createElement('script');
            script.src = `https://itunes.apple.com/search?term=NCT+127+Walk&entity=song&limit=1&callback=initSong`;
            document.body.appendChild(script);
        };

        // 검색된 곡을 오디오에 자동 연결
        window.initSong = function(data) {
            if (data.results && data.results.length > 0) {
                audio.src = data.results[0].previewUrl;
                document.getElementById('loadStatus').innerText = "✅ '삐그덕 (Walk)' 준비 완료!";
            } else {
                document.getElementById('loadStatus').innerText = "⚠️ 음원을 불러오지 못했습니다. (재시도 필요)";
            }
        };

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            const text = document.getElementById('userInput').value.replace(/\s/g, '').split('');

            if (isPlaying) {
                clearInterval(interval);
                audio.pause();
                btn.innerText = "시작 (WALK!)";
                btn.classList.remove('playing');
                isPlaying = false;
            } else {
                if (!audio.src) {
                    alert("아직 노래 데이터가 로드되지 않았습니다. 잠시만 기다려주세요!");
                    return;
                }
                
                audio.play();
                const ms = 60000 / currentBpm;
                
                interval = setInterval(() => {
                    document.getElementById('display').innerText = text[currentIndex];
                    currentIndex = (currentIndex + 1) % text.length;
                }, ms);

                btn.innerText = "정지";
                btn.classList.add('playing');
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
