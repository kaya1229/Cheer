<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT MeumMonBong - Final Calibration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        /* [비율 수정] 전체 높이를 줄여 정사각에 가까운 묵직한 비율로 변경 */
        .lightstick-container {
            position: relative;
            width: 360px; /* 너비 확장 */
            height: 340px; /* 높이 축소 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [핵심] 믐뭔봉 틀 - 좌우 돌출부 너비 확장 및 상단 너비 재조정 */
        .meummonbong-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            /* [색상 수정] 노란색 제거, 순수 네오 그린(#CEF13D) 기반 그라데이션 */
            background: radial-gradient(circle, #E8FFB1 5%, #D7FF4D 40%, #CEF13D 100%);
            
            /* 지적하신 비율 완벽 반영:
               - 상단 좁은 돌출부 (43% - 57%)
               - 좌우 돌출부 너비 확장 (0%, 100% 끝까지 채움)
               - 하단 묵직하고 넓은 베이스
            */
            clip-path: polygon(
                /* 상단 좁은 돌출 */
                43% 0%, 57% 0%, 62% 4%, 
                /* 우측 상단 */
                88% 4%, 93% 10%, 
                /* 우측 확장된 돌출부 */
                93% 22%, 100% 22%, 100% 78%, 93% 78%, 
                /* 우측 하단 */
                93% 90%, 88% 96%, 
                /* 하단 넓은 바닥 */
                12% 96%, 7% 90%, 
                /* 좌측 확장된 돌출부 */
                7% 78%, 0% 78%, 0% 22%, 7% 22%, 
                /* 좌측 상단 및 연결 */
                7% 10%, 12% 4%, 38% 4%
            );
            
            z-index: 5;
            /* 선명한 외곽선을 위해 미세한 보더 효과 */
            outline: 1px solid rgba(206, 241, 61, 0.5);
        }

        /* [색상 수정] 밖으로 퍼지는 빛도 노란 끼 없는 네오 그린 적용 */
        .glow-outer {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(206, 241, 61, 0.7) 0%, rgba(206, 241, 61, 0) 70%);
            z-index: 1;
            filter: blur(50px);
        }

        /* 중앙 글자 '가' */
        .display-text {
            position: relative;
            z-index: 10;
            font-size: 170px; /* 비율에 맞춰 글자 크기 최적화 */
            font-weight: 900;
            color: #000000;
            letter-spacing: -10px;
            text-shadow: 0 0 20px rgba(206, 241, 61, 0.4);
        }

        /* 삐그덕 비트(92 BPM) 호흡 애니메이션 */
        @keyframes walkBpm {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); }
        }

        .active {
            animation: walkBpm 0.65s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="lightstick-container active">
        <div class="glow-outer"></div>
        <div class="meummonbong-frame"></div>
        <div class="display-text">가</div>
    </div>

</body>
</html>
