<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Online Lightstick</title>
    <style>
        body { font-family: sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .header { width: 100%; max-width: 350px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .info { font-size: 13px; color: #333; line-height: 1.6; }
        .hashtag { color: #0066cc; font-size: 13px; margin-top: 10px; }
        
        /* 믐뭔봉 UI */
        .lightstick-container {
            width: 320px; height: 520px; background: #F3FFD5; border-radius: 20px;
            position: relative; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden;
        }
        .event-badge {
            background: #CEF13D; color: #000; font-weight: bold; padding: 4px 12px;
            border-radius: 4px; font-size: 12px; margin-top: 50px;
        }
        .event-text { font-size: 12px; text-align: center; margin-top: 10px; line-height: 1.4; }
        
        .frame {
            width: 180px; height: 250px; background: linear-gradient(#E8FF8E, #CEF13D);
            border-radius: 15px; margin-top: 40px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(206, 241, 61, 0.5);
        }
        .display-char { font-size: 100px; font-weight: bold; color: #000; }
        
        .volume-icon {
            position: absolute; bottom: 20px; right: 20px; width: 30px; height: 30px;
            background: #888; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;
        }

        /* 컨트롤러 */
        .controls { margin-top: 20px; width: 100%; max-width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #CEF13D; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="info">
            📍 당첨자 발표 : 2026.4.29(수) (개별 DM)<br>
            🎁 선물 : NCT 10주년 MD (인스타그램+X 총 10명, 품목 랜덤)
        </div>
        <div class="hashtag">#멜론 #NCT #NCT2026 #NCT_10TH_ANNIVERSARY</div>
    </div>

    <div class="lightstick-container">
        <div class="event-badge">EVENT</div>
        <div class="event-text">영상을 보고 NCT에게 전하는<br>10주년 축하 메시지를 맞춰 주세요🍀</div>
        
        <div class="frame">
            <div id="display" class="display-char">가</div>
        </div>
        
        <div class="volume-icon">🔊</div>
    </div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="문구를 입력하세요 (10-15자)" value="NCT와 시즈니 우리 평생 함께해">
        <select id="songSelect">
            <option value="138">NCT 127 - 영웅 (138 BPM)</option>
            <option value="128">NCT DREAM - Beatbox (128 BPM)</option>
            <option value="105">NCT U - Baggy Jeans (105 BPM)</option>
            <option value="80">Slow Ballad (80 BPM)</option>
        </select>
        <button onclick="togglePlay()" id="playBtn">재생 시작</button>
    </div>

    <script>
        let interval;
        let isPlaying = false;
        let currentIndex = 0;

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                clearInterval(interval);
                btn.innerText = "재생 시작";
            } else {
                startLoop();
                btn.innerText = "정지";
            }
            isPlaying = !isPlaying;
        }

        function startLoop() {
            const text = document.getElementById('userInput').value.replace(/\s/g, '');
            const bpm = document.getElementById('songSelect').value;
            const ms = 60000 / bpm;

            clearInterval(interval);
            interval = setInterval(() => {
                document.getElementById('display').innerText = text[currentIndex];
                currentIndex = (currentIndex + 1) % text.length;
            }, ms);
        }
    </script>
</body>
</html>
