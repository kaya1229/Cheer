<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT MeumMonBong - Text Edit Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        /* 믐뭔봉 컨테이너 - 정사각에 가까운 묵직한 비율 */
        .lightstick-container {
            position: relative;
            width: 360px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        /* 믐뭔봉 틀 - 좌우 확장 및 상단 좁은 돌출부 */
        .meummonbong-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #E8FFB1 5%, #D7FF4D 40%, #CEF13D 100%);
            clip-path: polygon(
                43% 0%, 67% 0%, 62% 4%, 88% 4%, 93% 10%, 
                93% 22%, 100% 15%, 100% 85%, 93% 78%, 
                93% 90%, 88% 96%, 12% 96%, 7% 90%, 
                7% 78%, 0% 85%, 0% 15%, 7% 22%, 
                7% 10%, 12% 4%, 38% 4%
            );
            z-index: 5;
        }

        /* 네오 그린 발광 효과 */
        .glow-outer {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(206, 241, 61, 0.7) 0%, rgba(206, 241, 61, 0) 70%);
            z-index: 1;
            filter: blur(50px);
        }

        /* 중앙 전광판 텍스트 */
        .display-text {
            position: relative;
            z-index: 10;
            font-size: 160px;
            font-weight: 900;
            color: #000000;
            letter-spacing: -10px;
            text-shadow: 0 0 20px rgba(206, 241, 61, 0.4);
            transition: all 0.1s ease-in-out;
        }

        /* 입력창 디자인 */
        .input-section {
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input {
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid #CEF13D;
            border-radius: 30px;
            outline: none;
            text-align: center;
            width: 250px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .tip {
            font-size: 14px;
            color: #888;
        }

        /* 기본 리듬 호흡 애니메이션 (92 BPM) */
        @keyframes walkBpm {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.2); }
        }

        .active {
            animation: walkBpm 0.65s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="container" class="lightstick-container active">
        <div class="glow-outer"></div>
        <div class="meummonbong-frame"></div>
        <div id="displayText" class="display-text">가</div>
    </div>

    <div class="input-section">
        <input type="text" id="textInput" placeholder="문구를 입력하세요" value="가">
        <div class="tip">입력하면 실시간으로 문구가 바뀝니다</div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const displayText = document.getElementById('displayText');
        let textArray = ["가"];
        let currentIndex = 0;

        // 입력창 내용 변경 감지
        textInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.length > 0) {
                textArray = val.split('');
                currentIndex = 0;
                displayText.innerText = textArray[currentIndex];
            } else {
                displayText.innerText = "";
            }
        });

        // 92 BPM 리듬에 맞춰 글자 자동 전환 (약 0.65초)
        setInterval(() => {
            if (textArray.length > 1) {
                currentIndex = (currentIndex + 1) % textArray.length;
                displayText.innerText = textArray[currentIndex];
            }
        }, 650);
    </script>

</body>
</html>
