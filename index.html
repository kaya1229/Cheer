<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Online Lightstick - WALK Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; transition: background 0.5s; overflow-x: hidden; }
        
        .header { width: 100%; max-width: 360px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .info { font-size: 14px; color: #333; font-weight: bold; }
        
        /* --- 핵심: 믐먼봉 UI (image_5.png 그라데이션 완벽 반영) --- */
        .meummonbong-frame {
            position: relative;
            width: 260px; /* 실제 이미지 비율 고려 */
            height: 380px;
            margin: 20px 0;
            display: flex; justify-content: center; align-items: center;
        }

        /* 믐먼봉의 입체적인 각진 구조 (CSS clip-path) */
        .meummonbong-shape {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            
            /* [수정 완] 가장자리로 갈수록 진해지는 네오그린 그라데이션 (발광 연출) */
            background: radial-gradient(circle at center, #ffffff 0%, #f3ffd5 40%, #cef13d 100%);
            
            /* 이미지 특유의 각진 절개 형태 구현 */
            clip-path: polygon(
                /* 상단 각 */ 10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%
            );
            
            /* 은은하게 밖으로 퍼지는 빛 효과 (Soft Glow) */
            box-shadow: 0 0 30px rgba(206, 241, 61, 0.3);
            transition: box-shadow 0.5s ease;
        }

        /* 중앙 글자 영역 */
        .display-area {
            position: relative;
            z-index: 2;
            display: flex; justify-content: center; align-items: center;
            width: 75%; height: 75%;
            background: rgba(255, 255, 255, 0.2); /* 미세한 투명도 */
            border-radius: 15px;
            
            /* 내부 Glow 효과 */
            box-shadow: inset 0 0 15px rgba(206, 241, 61, 0.2);
        }

        .display-char {
            font-size: 130px; /* 큼직하게 */
            font-weight: 900; /* 아주 굵게 */
            color: #000;
            /* 글자 주변 부드러운 네온 빛 */
            text-shadow: 0 0 10px rgba(206, 241, 61, 0.8), 0 0 20px rgba(206, 241, 61, 0.5);
        }

        /* 컨트롤 영역 */
        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 16px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; text-align: center; }
        button { padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        #playBtn { background: #000; color: #CEF13D; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        #playBtn.playing { background: #ff4d4d; color: #fff; }
        
        .song-status { font-size: 13px; color: #666; text-align: center; margin-top: 5px; }

        /* --- 부드러운 '숨 쉬는' 빛 애니메이션 (Soft Breathing) --- */
        @keyframes breathingGlow {
            0% { box-shadow: 0 0 20px rgba(206, 241, 61, 0.2); background: radial-gradient(circle, rgba(206, 241, 61, 0.1) 0%, rgba(206, 241, 61, 0) 70%); }
            50% { box-shadow: 0 0 50px rgba(206, 241, 61, 0.6); background: radial-gradient(circle, rgba(206, 241, 61, 0.4) 0%, rgba(206, 241, 61, 0) 70%); }
            100% { box-shadow: 0 0 20px rgba(206, 241, 61, 0.2); background: radial-gradient(circle, rgba(206, 241, 61, 0.1) 0%, rgba(206, 241, 61, 0) 70%); }
        }

        /* 재생 중일 때 프레임과 화면 배경에 적용 */
        .playing-glow .meummonbong-shape { animation: breathingGlow 2s infinite ease-in-out; }
        .playing-glow body { animation: breathingGlow 4s infinite ease-in-out; }
    </style>
</head>
<body id="lightstickBody">

    <div class="header">
        <div class="info">🎵 Now Playing: NCT 127 - 삐그덕 (Walk)</div>
    </div>

    <div id="lightstickFrame" class="meummonbong-frame">
        <div class="meummonbong-shape"></div> <div class="display-area">
            <div id="display" class="display-char">W</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="문구 입력" value="우리 평생 함께하자 시즈니 가">
        <button id="playBtn" onclick="togglePlay()">시작 (WALK!)</button>
        <div id="loadStatus" class="song-status">음악 데이터를 불러오는 중... (전광판은 즉시 가능) }</div>
    </div>

    <audio id="audioPlayer" loop crossorigin="anonymous"></audio>

    <script>
        let interval;
        let isPlaying = false;
        let currentIndex = 0;
        const currentBpm = 92; // '삐그덕 (Walk)' 고정 BPM
        const audio = document.getElementById('audioPlayer');
        const frame = document.getElementById('lightstickFrame');
        const body = document.getElementById('lightstickBody');
        let musicReady = false;

        // 페이지 로드 시 '삐그덕 (Walk)'를 자동으로 검색해서 세팅
        window.onload = function() {
            const script = document.createElement('script');
            script.src = `https://itunes.apple.com/search?term=NCT+127+Walk&entity=song&limit=1&callback=initSong`;
            document.body.appendChild(script);
        };

        // 검색된 곡을 오디오에 자동 연결
        window.initSong = function(data) {
            if (data.results && data.results.length > 0) {
                audio.src = data.results[0].previewUrl;
                musicReady = true;
                document.getElementById('loadStatus').innerText = "✅ 음악 로드 완료!";
            } else {
                document.getElementById('loadStatus').innerText = "⚠️ 음악 로드 실패 (전광판만 작동)";
            }
        };

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            const rawText = document.getElementById('userInput').value;
            const text = rawText.split(''); // 공백 포함하여 한 글자씩 분리

            if (isPlaying) {
                // 정지 로직
                clearInterval(interval);
                audio.pause();
                btn.innerText = "시작 (WALK!)";
                btn.classList.remove('playing');
                body.parentElement.classList.remove('playing-glow'); // 전역 Glow 제거
                isPlaying = false;
            } else {
                // 시작 로직 (음악 준비 여부와 상관없이 즉시 실행)
                isPlaying = true;
                btn.innerText = "정지";
                btn.classList.add('playing');
                body.parentElement.classList.add('playing-glow'); // 전역 Glow 시작 (숨 쉬는 효과)

                // 1. 전광판 애니메이션 즉시 시작 (W부터 순서대로)
                const ms = 60000 / currentBpm;
                document.getElementById('display').innerText = text[currentIndex];
                currentIndex = (currentIndex + 1) % text.length;

                interval = setInterval(() => {
                    document.getElementById('display').innerText = text[currentIndex];
                    currentIndex = (currentIndex + 1) % text.length;
                }, ms);

                // 2. 음악 재생 (준비되었다면)
                if (musicReady) {
                    audio.play().catch(e => console.log("음악 재생 대기 중..."));
                }
            }
        }
    </script>
</body>
</html>
