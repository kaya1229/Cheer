<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT MeumMonBong UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 믐뭔봉 전체 컨테이너 */
        .lightstick-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [핵심] 믐뭔봉 외곽 틀 - 이미지의 상단/측면 굴곡 재현 */
        .meummonbong-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            /* 가장자리로 갈수록 진해지는 네오 그린 그라데이션 */
            background: radial-gradient(circle, #faffd1 20%, #e8ff8c 60%, #cef13d 100%);
            
            /* 이미지와 동일한 실루엣을 위한 정교한 커팅 */
            clip-path: polygon(
                30% 0%, 70% 0%, 75% 5%, 85% 5%, 95% 15%, 95% 25%, 100% 30%, 100% 70%, 95% 75%, 95% 85%, 85% 95%, 75% 95%, 70% 100%, 30% 100%, 25% 95%, 15% 95%, 5% 85%, 5% 75%, 0% 70%, 0% 30%, 5% 25%, 5% 15%, 15% 5%, 25% 5%
            );
            
            /* 틀 자체가 발광하는 듯한 부드러운 외곽 빛 효과 */
            filter: drop-shadow(0 0 15px rgba(206, 241, 61, 0.6));
        }

        /* 가장자리에서 밖으로 더 뻗어나가는 추가 광원 효과 */
        .glow-spread {
            position: absolute;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle, rgba(206, 241, 61, 0.4) 0%, rgba(206, 241, 61, 0) 70%);
            z-index: -1;
            filter: blur(20px);
        }

        /* 중앙 글자 '가' - 이미지 폰트 스타일 재현 */
        .display-text {
            position: relative;
            z-index: 10;
            font-size: 150px;
            font-weight: 900;
            color: #000000;
            letter-spacing: -5px;
            /* 텍스트가 묻히지 않도록 아주 미세한 흰색 광택 추가 */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* 92 BPM 박자에 맞춘 미세한 숨쉬기 효과 (눈이 아프지 않은 정도) */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.95; }
        }

        .active-glow {
            animation: breathe 0.65s infinite ease-in-out; /* 92 BPM 기준 */
        }
    </style>
</head>
<body>

    <div class="lightstick-container active-glow">
        <div class="glow-spread"></div>
        <div class="meummonbong-frame"></div>
        <div class="display-text">가</div>
    </div>

</body>
</html>
