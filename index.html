<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCT Online Lightstick - Perfect MeumMonBong</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* 헤더 (원본 이미지 유지) */
        .header { width: 100%; max-width: 360px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; text-align: left; }
        .info { font-size: 14px; color: #333; line-height: 1.6; }
        .hashtag { color: #0066cc; font-size: 14px; margin-top: 10px; font-weight: bold; }
        
        /* --- 핵심: 믐먼봉 UI (image_4.png 실루엣 완벽 재현) --- */
        .meummonbong-frame {
            position: relative;
            width: 250px; /* 이미지 비율 고려 */
            height: 350px;
            margin: 20px 0;
            overflow: hidden; /* 내부 glow 효과가 넘치지 않도록 */
        }

        /* 믐먼봉의 특징적인 외부 절개 라인 (CSS clip-path로 정교하게 구현) */
        .meummonbong-shape {
            width: 100%; height: 100%;
            background: #F3FFD5; /* 이미지의 연한 네온 연두색 */
            position: absolute; top: 0; left: 0;
            
            clip-path: polygon(
                /* 상단 각 */ 10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%,
                /* 내부 구멍: 발광 효과 시 선명도를 높이기 위함 */
                2% 10%, 2% 90%, 90% 98%, 98% 90%, 98% 10%, 90% 2%, 10% 2%
            );
        }

        /* 내부 Glow 효과 (부드러운 빛 퍼짐) */
        .glow-effect {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(206, 241, 61, 0.4) 10%, rgba(206, 241, 61, 0) 60%);
            filter: blur(15px);
        }

        /* 중앙 글자 (image_4.png 폰트 느낌 반영) */
        .display-char {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 130px; /* 큼직하게 */
            font-weight: 800; /* 아주 굵게 */
            color: #000;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); /* 글자 주변 미세한 빛 */
        }

        /* 볼륨 아이콘 (원본 이미지 유지) */
        .volume-icon {
            position: absolute; bottom: 20px; right: 20px;
            width: 32px; height: 32px;
            background: rgba(136, 136, 136, 0.8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;
            font-size: 14px;
        }

        /* --- 컨트롤 및 검색 --- */
        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: #CEF13D; border: none; font-weight: bold; cursor: pointer; color: #000; transition: background 0.2s; }
        button:hover { background: #B4D735; }
        button.playing { background: #ff4d4d; color: white; } /* 재생 중일 때 버튼 색상 변경 */
        
        #songList { max-height: 150px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; display: none; background: #fafafa; margin-top: 5px; }
        .song-item { padding: 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #eee; }
        .song-item:hover { background: #f0f0f0; }
        .selected-info { font-size: 12px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="info">
            📍 당첨자 발표 : 2026.4.29(수) (개별 DM)<br>
            🎁 선물 : NCT 10주년 MD (인스타그램+X 총 10명, 품목 랜덤)
        </div>
        <div class="hashtag">#멜론 #NCT #NCT2026 #NCT_10TH_ANNIVERSARY</div>
    </div>

    <div class="meummonbong-frame">
        <div class="meummonbong-shape">
            <div class="glow-effect"></div> </div>
        <div id="display" class="display-char">W</div>
        
        <div class="volume-icon">🔊</div>
    </div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="메시지 입력 (10~15자)" value="우리 평생 함께하자 시즈니 가">
        
        <button onclick="searchNctSongs()">NCT 노래 불러오기 (iTunes API)</button>
        <div id="songList"></div>
        
        <div id="currentSongDisplay" class="selected-info">선택된 곡 없음</div>
        <button id="playBtn" onclick="togglePlay()" style="background: #000; color: #CEF13D;">재생 시작</button>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        let interval;
        let isPlaying = false;
        let currentIndex = 0;
        let currentText = "";
        let currentBpm = 120; // 기본값
        const audio = document.getElementById('audioPlayer');

        // 곡별 가상 BPM 매칭 데이터 (최신곡 반영)
        const bpmMap = {
            "Hello Future": 175,
            "윤슬 (Gold Dust)": 84,
            "영웅 (Kick It)": 138,
            "Beatbox": 128,
            "Baggy Jeans": 105,
            "Candy": 122,
            "Fact Check": 140,
            "Smoothie": 110
        };

        // 1. iTunes API를 이용한 곡 검색
        async function searchNctSongs() {
            const songListDiv = document.getElementById('songList');
            songListDiv.innerHTML = "<div class='song-item'>곡을 찾는 중입니다...</div>";
            songListDiv.style.display = "block";

            // 검색 키워드를 더 구체적으로 확장하여 최신곡 유도
            const url = 'https://itunes.apple.com/search?term=NCT+Hello+Future+Gold+Dust+Fact+Check&entity=song&limit=30&country=kr';

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.resultCount === 0) {
                    songListDiv.innerHTML = "<div class='song-item'>검색 결과가 없습니다.</div>";
                    return;
                }

                songListDiv.innerHTML = "";
                data.results.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'song-item';
                    div.innerText = `${song.trackName} - ${song.artistName}`;
                    div.onclick = () => selectSong(song);
                    songListDiv.appendChild(div);
                });
            } catch (e) {
                console.error("API 호출 실패:", e);
                songListDiv.innerHTML = `<div class='song-item' style='color:red;'>오류 발생: ${e.message}</div>`;
            }
        }

        // 2. 곡 선택 시 오디오 및 BPM 설정
        function selectSong(song) {
            audio.src = song.previewUrl; // 30초 미리보기 음원
            document.getElementById('currentSongDisplay').innerText = `선택됨: ${song.trackName}`;
            document.getElementById('songList').style.display = "none";
            
            // 제목에 포함된 단어로 BPM 매칭, 없으면 120
            currentBpm = 120;
            for (let key in bpmMap) {
                if (song.trackName.includes(key)) {
                    currentBpm = bpmMap[key];
                    break;
                }
            }
            if (isPlaying) togglePlay(); // 이미 재생 중이면 껐다 켜기
        }

        // 3. 재생 로직
        function togglePlay() {
            const btn = document.getElementById('playBtn');
            const rawText = document.getElementById('userInput').value;
            currentText = rawText.split(''); // 공백 포함하여 한 글자씩 분리 (가독성 확보)
            
            if (currentText.length === 0) currentText = [' '];
            currentIndex = 0;

            if (isPlaying) {
                clearInterval(interval);
                audio.pause();
                btn.innerText = "재생 시작";
                btn.classList.remove('playing');
                isPlaying = false;
            } else {
                if (!audio.src) {
                    alert("먼저 노래를 불러오고 선택해주세요!");
                    return;
                }
                audio.play();
                const ms = 60000 / currentBpm; // BPM -> ms 간격 계산
                
                // 첫 글자 즉시 표시
                document.getElementById('display').innerText = currentText[currentIndex];
                currentIndex = (currentIndex + 1) % currentText.length;

                interval = setInterval(() => {
                    document.getElementById('display').innerText = currentText[currentIndex];
                    currentIndex = (currentIndex + 1) % currentText.length;
                }, ms);

                btn.innerText = "정지";
                btn.classList.add('playing');
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
